services:
  pgdatabase:
    image: postgres:16
    environment:
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy
      POSTGRES_DB: energy_dss
    volumes:
      - energy_postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"

  kestra:
    image: kestra/kestra:latest
    user: "root"
    command: server standalone
    ports:
      - "8087:8080"
      - "8088:8081"
    volumes:
      - kestra_data:/app/storage
      - ../:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
    environment:
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx2g"
      ENTSOE_API_TOKEN: "${ENTSOE_API_TOKEN}"

      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://pgdatabase:5432/kestra
            driverClassName: org.postgresql.Driver
            username: energy
            password: energy

        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          tutorialFlows:
            enabled: false
          server:
            basic-auth:
              enabled: true
              username: admin@energy.local
              password: Trailda7A

    depends_on:
      - pgdatabase

volumes:
  energy_postgres_data:
  kestra_data:
