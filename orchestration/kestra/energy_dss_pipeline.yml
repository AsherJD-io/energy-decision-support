id: energy_dss_pipeline
namespace: energy

inputs:
  - id: country_code
    type: STRING
    defaults: SE

  - id: bidding_zone
    type: STRING
    defaults: 10YSE-1--------K

  - id: start_date
    type: STRING
    defaults: 2025-12-01

  - id: end_date
    type: STRING
    defaults: 2025-12-31

tasks:
  - id: ingest
    type: io.kestra.plugin.docker.Run
    containerImage: docker-ingestion:latest
    networkMode: docker_default
    commands:
      - "--country-code={{ inputs.country_code }}"
      - "--bidding-zone={{ inputs.bidding_zone }}"
      - "--start-date={{ inputs.start_date }}"
      - "--end-date={{ inputs.end_date }}"
      - "--target-table=energy_load_raw"
    env:
      PG_HOST: "34.38.45.106"
      PG_PORT: "5432"
      PG_DB: energy_dss
      PG_USER: energy
      PG_PASSWORD: energy123
      ENTSOE_API_TOKEN: "{{ secret('ENTSOE_API_TOKEN') }}"

  - id: build_clean
    type: io.kestra.plugin.docker.Run
    containerImage: postgres:16
    networkMode: docker_default
    commands:
      - sh
      - -c
      - |
          export PGPASSWORD=energy123
          psql -h 34.38.45.106 -U energy -d energy_dss -v ON_ERROR_STOP=1 <<'SQL'
          SET search_path TO public;

          CREATE TABLE IF NOT EXISTS energy_load_clean (
              time_utc TIMESTAMP NOT NULL,
              country_code TEXT NOT NULL,
              bidding_zone TEXT NOT NULL,
              load_mw DOUBLE PRECISION NOT NULL,
              source TEXT,
              ingested_at TIMESTAMP,
              PRIMARY KEY (time_utc, country_code, bidding_zone)
          );

          CREATE INDEX IF NOT EXISTS idx_energy_load_clean_zone_time
          ON energy_load_clean (country_code, bidding_zone, time_utc);

          CREATE INDEX IF NOT EXISTS idx_energy_load_clean_ingested_at
          ON energy_load_clean (ingested_at);

          INSERT INTO energy_load_clean (
              time_utc,
              country_code,
              bidding_zone,
              load_mw,
              source,
              ingested_at
          )
          SELECT
              r.time_utc,
              r.country_code,
              r.bidding_zone,
              r.load_mw,
              COALESCE(r.source, 'ENTSO-E'),
              r.ingested_at
          FROM energy_load_raw r
          WHERE r.load_mw IS NOT NULL
            AND r.load_mw >= 0
          ON CONFLICT (time_utc, country_code, bidding_zone) DO UPDATE
          SET
              load_mw = EXCLUDED.load_mw,
              source = EXCLUDED.source,
              ingested_at = EXCLUDED.ingested_at;
          SQL

  - id: build_dq
    type: io.kestra.plugin.docker.Run
    containerImage: postgres:16
    networkMode: docker_default
    commands:
      - sh
      - -c
      - |
          export PGPASSWORD=energy123
          psql -h 34.38.45.106 -U energy -d energy_dss -v ON_ERROR_STOP=1 <<'SQL'
          SET search_path TO public;

          DROP VIEW IF EXISTS dq_assertions CASCADE;
          DROP VIEW IF EXISTS dq_reconciliation_summary CASCADE;
          DROP VIEW IF EXISTS dq_pipeline_status CASCADE;
          DROP VIEW IF EXISTS dq_invalid_loads CASCADE;
          DROP VIEW IF EXISTS dq_missing_hours CASCADE;

          CREATE VIEW dq_missing_hours AS
          WITH bounds AS (
              SELECT MIN(time_utc) AS min_ts, MAX(time_utc) AS max_ts
              FROM energy_load_clean
          ),
          series AS (
              SELECT generate_series(min_ts, max_ts, INTERVAL '1 hour') AS ts
              FROM bounds
              WHERE min_ts IS NOT NULL AND max_ts IS NOT NULL
          )
          SELECT s.ts
          FROM series s
          LEFT JOIN energy_load_clean c
            ON s.ts = c.time_utc
          WHERE c.time_utc IS NULL;

          CREATE VIEW dq_invalid_loads AS
          SELECT *
          FROM energy_load_clean
          WHERE load_mw IS NULL OR load_mw < 0;

          CREATE VIEW dq_assertions AS
          SELECT
              'missing_hours_check' AS check_name,
              CASE
                  WHEN COUNT(*) <= 50 THEN 'PASS'
                  ELSE 'FAIL'
              END AS status
          FROM dq_missing_hours

          UNION ALL

          SELECT
              'invalid_loads_check',
              CASE
                  WHEN COUNT(*) = 0 THEN 'PASS'
                  ELSE 'FAIL'
              END
          FROM dq_invalid_loads;
          SQL

  - id: build_analytics
    type: io.kestra.plugin.docker.Run
    containerImage: postgres:16
    networkMode: docker_default
    commands:
      - sh
      - -c
      - |
          export PGPASSWORD=energy123
          psql -h 34.38.45.106 -U energy -d energy_dss <<'SQL'
          SET search_path TO public;

          DROP VIEW IF EXISTS daily_load_summary;

          CREATE VIEW daily_load_summary AS
          SELECT
              DATE(time_utc) AS date,
              AVG(load_mw) AS avg_load,
              MAX(load_mw) AS peak_load
          FROM energy_load_clean
          GROUP BY DATE(time_utc);
          SQL

  - id: build_mart
    type: io.kestra.plugin.docker.Run
    containerImage: postgres:16
    networkMode: docker_default
    commands:
      - sh
      - -c
      - |
          export PGPASSWORD=energy123
          psql -h 34.38.45.106 -U energy -d energy_dss <<'SQL'
          SET search_path TO public;

          DROP VIEW IF EXISTS mart_energy_system_metrics;

          CREATE VIEW mart_energy_system_metrics AS
          SELECT
              AVG(load_mw) AS avg_load,
              MAX(load_mw) AS max_load,
              MIN(load_mw) AS min_load
          FROM energy_load_clean;
          SQL

  - id: validate_dq
    type: io.kestra.plugin.docker.Run
    containerImage: postgres:16
    networkMode: docker_default
    commands:
      - sh
      - -c
      - |
          export PGPASSWORD=energy123
          FAIL_COUNT=$(psql -h 34.38.45.106 -U energy -d energy_dss -t -A -c "SELECT COUNT(*) FROM dq_assertions WHERE status = 'FAIL';")

          echo "DQ FAIL COUNT: ${FAIL_COUNT}"

          if [ "${FAIL_COUNT}" -gt 0 ]; then
            exit 1
          fi

          echo "DQ PASSED"
